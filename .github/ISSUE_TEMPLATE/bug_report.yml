name: Bug report
description: Report a reproducible problem in LogScope behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: LogScope exits when running with --dashboard --follow on Windows Terminal.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, shell, and install method.
      placeholder: Python 3.11, Windows 11, PowerShell, installed via pip
    validations:
      required: true

  - type: textarea
    id: minimal_repro
    attributes:
      label: Minimal reproducible code/log
      description: Smallest command + log sample needed to reproduce.
      render: shell
    validations:
      required: true
